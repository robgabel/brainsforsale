<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore: Scott Belsky's Brain</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #14141f;
    --surface-2: #1c1c2e;
    --border: #2a2a3e;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.15);
    --supports: #34d399;
    --extends: #60a5fa;
    --contradicts: #f87171;
    --related: #a78bfa;
    --high: #34d399;
    --medium: #fbbf24;
    --low: #8888a0;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .header .brain-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .header .brain-name span { color: var(--accent); }

  .stats {
    display: flex;
    gap: 16px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .stats b { color: var(--text); font-weight: 600; }

  /* Search */
  .search-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap input {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-dim); }

  /* Cluster List */
  .cluster-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .cluster-item {
    padding: 10px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }

  .cluster-item:hover { background: var(--surface-2); }

  .cluster-item.active {
    background: var(--accent-glow);
    border-left-color: var(--accent);
  }

  .cluster-item .name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .cluster-item .count {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface-2);
    padding: 2px 8px;
    border-radius: 12px;
    min-width: 28px;
    text-align: center;
  }

  .cluster-item.active .count {
    background: var(--accent);
    color: white;
  }

  .cluster-item.all-item {
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
    padding-bottom: 12px;
  }

  /* Top bar */
  .topbar {
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .topbar h2 {
    font-size: 16px;
    font-weight: 600;
  }

  .sort-controls {
    display: flex;
    gap: 6px;
  }

  .sort-btn {
    padding: 4px 10px;
    font-size: 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .sort-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .sort-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Atom List */
  .atom-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }

  .atom-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .atom-card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .atom-card.expanded {
    border-color: var(--accent);
    box-shadow: 0 0 30px var(--accent-glow);
  }

  .atom-content {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
  }

  .atom-meta {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .confidence-score {
    font-size: 11px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    padding: 1px 6px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }

  .confidence-score.high { background: rgba(52, 211, 153, 0.15); color: var(--high); }
  .confidence-score.medium { background: rgba(251, 191, 36, 0.15); color: var(--medium); }
  .confidence-score.low { background: rgba(136, 136, 160, 0.15); color: var(--low); }

  .atom-meta .tag {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
  }

  .atom-meta .date {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .atom-meta .source-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
  }

  .atom-meta .source-link:hover { text-decoration: underline; }

  /* Connections panel */
  .connections-panel {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: none;
  }

  .atom-card.expanded .connections-panel { display: block; }

  .connections-panel h4 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .conn-item {
    padding: 10px 12px;
    background: var(--surface-2);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 13px;
    line-height: 1.5;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .conn-item:hover { background: var(--border); }

  .conn-type {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .conn-type.supports { background: rgba(52, 211, 153, 0.15); color: var(--supports); }
  .conn-type.extends { background: rgba(96, 165, 250, 0.15); color: var(--extends); }
  .conn-type.contradicts { background: rgba(248, 113, 113, 0.15); color: var(--contradicts); }
  .conn-type.related { background: rgba(167, 139, 250, 0.15); color: var(--related); }

  .conn-text { color: var(--text-dim); }

  /* Topic cloud in atom */
  .topic-cloud {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .topic-chip {
    font-size: 10px;
    padding: 1px 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .topic-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-dim);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }
  .empty-state p { font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Results count */
  .results-count {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* Search highlight */
  mark {
    background: rgba(99, 102, 241, 0.3);
    color: var(--text);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { width: 220px; min-width: 220px; }
    .atom-list { padding: 12px 16px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="header">
      <h1>BrainsForSale</h1>
      <div class="brain-name" id="brainName"><span>Scott</span> Belsky</div>
      <div class="stats" id="stats"></div>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search atoms..." autocomplete="off">
    </div>
    <div class="cluster-list" id="clusterList"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <h2 id="viewTitle">All Atoms</h2>
        <span class="results-count" id="resultsCount"></span>
      </div>
      <div class="sort-controls">
        <button class="sort-btn active" data-sort="date">Newest</button>
        <button class="sort-btn" data-sort="confidence">Confidence</button>
        <button class="sort-btn" data-sort="connections">Most Connected</button>
      </div>
    </div>
    <div class="atom-list" id="atomList"></div>
  </div>
</div>

<script>
let DATA = null;
let atomMap = {};
let currentCluster = null;
let currentSort = 'date';
let searchQuery = '';
let expandedAtomId = null;

const CLUSTER_LABELS = {
  ai_agents: 'AI Agents & Agentic Commerce',
  product_design: 'Product Design & Strategy',
  leadership: 'Leadership & Org Design',
  craft_originality: 'Craft, Originality & Taste',
  consumer_ai: 'Consumer AI & Social',
  competitive_moats: 'Competitive Advantage & Moats',
  platform_strategy: 'Platform Strategy & Networks',
  creator_economy: 'Creator Economy & Brands',
  memory_knowledge: 'Memory, Learning & Knowledge',
  superhumanity: 'Superhumanity & Agency',
  future_of_work: 'Future of Work & Talent',
  commerce: 'Commerce & Economic Models',
  vibe_coding: 'Vibe Coding & Software Abundance',
  enterprise_ai: 'Enterprise AI & Internal Tools',
  osint: 'OSINT & Info Warfare',
  longevity: 'Longevity & Health'
};

async function init() {
  // Try three loading strategies:
  // 1. Inline data (injected by export pipeline as window.BRAIN_DATA)
  // 2. Fetch from same directory (works on http://)
  // 3. Script tag injection (fallback for file://)
  if (window.BRAIN_DATA) {
    DATA = window.BRAIN_DATA;
  } else {
    try {
      const resp = await fetch('brain-atoms.json');
      if (!resp.ok) throw new Error(resp.status);
      DATA = await resp.json();
    } catch (e) {
      // Fallback: try loading via dynamic script tag (works on file://)
      try {
        DATA = await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'brain-atoms.json';
          // brain-atoms.json is pure JSON, so we read it as text and parse
          const xhr = new XMLHttpRequest();
          xhr.open('GET', 'brain-atoms.json', true);
          xhr.onload = () => {
            if (xhr.status === 200 || xhr.status === 0) {
              resolve(JSON.parse(xhr.responseText));
            } else { reject(); }
          };
          xhr.onerror = reject;
          xhr.send();
        });
      } catch (e2) {
        document.getElementById('atomList').innerHTML =
          '<div class="empty-state"><div class="icon">!</div><h3>Could not load brain-atoms.json</h3>' +
          '<p>Make sure explore.html and brain-atoms.json are in the same folder, ' +
          'or open via a local server: <code>python3 -m http.server</code></p></div>';
        return;
      }
    }
  }

  // Build atom lookup
  DATA.atoms.forEach(a => { atomMap[a.id] = a; });

  // Render stats
  const b = DATA.brain;
  document.getElementById('stats').innerHTML =
    `<span><b>${b.atom_count}</b> atoms</span>` +
    `<span><b>${b.connection_count}</b> connections</span>` +
    `<span><b>${b.cluster_count}</b> clusters</span>`;

  // Set brain name from data
  const parts = b.name.split(' ');
  if (parts.length >= 2) {
    document.getElementById('brainName').innerHTML =
      `<span>${parts[0]}</span> ${parts.slice(1).join(' ')}`;
  }

  renderClusterList();
  renderAtoms();
  bindEvents();
}

function renderClusterList() {
  const counts = {};
  DATA.atoms.forEach(a => {
    counts[a.cluster] = (counts[a.cluster] || 0) + 1;
  });

  // Sort clusters by count descending
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

  let html = `<div class="cluster-item all-item active" data-cluster="">
    <span class="name">All Clusters</span>
    <span class="count">${DATA.atoms.length}</span>
  </div>`;

  sorted.forEach(([slug, count]) => {
    const label = CLUSTER_LABELS[slug] || slug;
    html += `<div class="cluster-item" data-cluster="${slug}">
      <span class="name">${label}</span>
      <span class="count">${count}</span>
    </div>`;
  });

  document.getElementById('clusterList').innerHTML = html;
}

function getFilteredAtoms() {
  let atoms = DATA.atoms;

  // Filter by cluster
  if (currentCluster) {
    atoms = atoms.filter(a => a.cluster === currentCluster);
  }

  // Filter by search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    atoms = atoms.filter(a =>
      a.content.toLowerCase().includes(q) ||
      (a.topics && a.topics.some(t => t.toLowerCase().includes(q))) ||
      (a.cluster && CLUSTER_LABELS[a.cluster] && CLUSTER_LABELS[a.cluster].toLowerCase().includes(q))
    );
  }

  // Sort
  if (currentSort === 'date') {
    atoms.sort((a, b) => (b.source_date || '').localeCompare(a.source_date || ''));
  } else if (currentSort === 'confidence') {
    atoms.sort((a, b) => (b.confidence || 0) - (a.confidence || 0));
  } else if (currentSort === 'connections') {
    atoms.sort((a, b) => (b.connections?.length || 0) - (a.connections?.length || 0));
  }

  return atoms;
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function confidenceLabel(val) {
  if (val >= 0.9) return 'high';
  if (val >= 0.85) return 'medium';
  return 'low';
}

function renderAtoms() {
  const atoms = getFilteredAtoms();
  const container = document.getElementById('atomList');

  // Update title
  const title = currentCluster ? (CLUSTER_LABELS[currentCluster] || currentCluster) : 'All Atoms';
  document.getElementById('viewTitle').textContent = title;
  document.getElementById('resultsCount').textContent =
    searchQuery ? `${atoms.length} result${atoms.length !== 1 ? 's' : ''}` : `${atoms.length} atoms`;

  if (atoms.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="icon">&#x1f50d;</div>
      <h3>No atoms found</h3>
      <p>${searchQuery ? 'Try a different search term.' : 'This cluster has no atoms.'}</p>
    </div>`;
    return;
  }

  let html = '';
  atoms.forEach(atom => {
    const isExpanded = expandedAtomId === atom.id;
    const tier = confidenceLabel(atom.confidence);
    const dateStr = atom.source_date ? new Date(atom.source_date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '';

    html += `<div class="atom-card ${isExpanded ? 'expanded' : ''}" data-id="${atom.id}">
      <div class="atom-content">${highlightText(atom.content, searchQuery)}</div>
      <div class="topic-cloud">
        ${(atom.topics || []).map(t =>
          `<span class="topic-chip" data-topic="${escapeHtml(t)}">${escapeHtml(t)}</span>`
        ).join('')}
      </div>
      <div class="atom-meta">
        <span class="confidence-score ${tier}" title="Confidence: ${tier}">${atom.confidence ? atom.confidence.toFixed(2) : ''}</span>
        <span class="tag">${CLUSTER_LABELS[atom.cluster] || atom.cluster}</span>
        ${atom.source_ref ? `<a class="source-link" href="${escapeHtml(atom.source_ref)}" target="_blank" rel="noopener">Source</a>` : ''}
        ${dateStr ? `<span class="date">${dateStr}</span>` : ''}
      </div>
      <div class="connections-panel">${isExpanded ? renderConnections(atom) : ''}</div>
    </div>`;
  });

  container.innerHTML = html;
}

function renderConnections(atom) {
  if (!atom.connections || atom.connections.length === 0) {
    return '<h4>No Connections</h4><p style="font-size:12px;color:var(--text-dim)">This atom has no typed connections yet.</p>';
  }

  let html = `<h4>${atom.connections.length} Connection${atom.connections.length !== 1 ? 's' : ''}</h4>`;

  atom.connections.forEach(conn => {
    const target = atomMap[conn.target_id];
    if (!target) return;

    const rel = conn.relationship || 'related';
    const snippet = target.content.length > 180
      ? target.content.substring(0, 180) + '...'
      : target.content;

    html += `<div class="conn-item" data-target="${conn.target_id}">
      <span class="conn-type ${rel}">${rel}</span>
      <span class="conn-text">${escapeHtml(snippet)}</span>
    </div>`;
  });

  return html;
}

function bindEvents() {
  // Cluster selection
  document.getElementById('clusterList').addEventListener('click', e => {
    const item = e.target.closest('.cluster-item');
    if (!item) return;

    document.querySelectorAll('.cluster-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
    currentCluster = item.dataset.cluster || null;
    expandedAtomId = null;
    renderAtoms();
    document.getElementById('atomList').scrollTop = 0;
  });

  // Search
  let searchTimeout;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchQuery = e.target.value.trim();
      expandedAtomId = null;
      renderAtoms();
    }, 200);
  });

  // Sort buttons
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      renderAtoms();
    });
  });

  // Atom card click (expand/collapse)
  document.getElementById('atomList').addEventListener('click', e => {
    // Connection click — navigate to that atom
    const connItem = e.target.closest('.conn-item');
    if (connItem) {
      e.stopPropagation();
      const targetId = connItem.dataset.target;
      const targetAtom = atomMap[targetId];
      if (targetAtom) {
        // Switch to target's cluster
        currentCluster = targetAtom.cluster;
        expandedAtomId = targetId;
        searchQuery = '';
        document.getElementById('search').value = '';

        // Update sidebar
        document.querySelectorAll('.cluster-item').forEach(el => {
          el.classList.toggle('active',
            (el.dataset.cluster || null) === currentCluster
          );
        });

        renderAtoms();

        // Scroll to the expanded atom
        setTimeout(() => {
          const el = document.querySelector(`.atom-card[data-id="${targetId}"]`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
      }
      return;
    }

    // Topic chip click — search for that topic
    const topicChip = e.target.closest('.topic-chip');
    if (topicChip) {
      e.stopPropagation();
      const topic = topicChip.dataset.topic;
      searchQuery = topic;
      document.getElementById('search').value = topic;
      currentCluster = null;
      expandedAtomId = null;
      document.querySelectorAll('.cluster-item').forEach(el => {
        el.classList.toggle('active', !el.dataset.cluster);
      });
      renderAtoms();
      return;
    }

    // Atom card click — toggle expand
    const card = e.target.closest('.atom-card');
    if (!card) return;

    const id = card.dataset.id;
    if (expandedAtomId === id) {
      expandedAtomId = null;
    } else {
      expandedAtomId = id;
    }
    renderAtoms();

    // Keep scroll position near the clicked atom
    if (expandedAtomId) {
      setTimeout(() => {
        const el = document.querySelector(`.atom-card[data-id="${id}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('search').focus();
    }
    if (e.key === 'Escape') {
      document.getElementById('search').value = '';
      searchQuery = '';
      expandedAtomId = null;
      document.getElementById('search').blur();
      renderAtoms();
    }
  });
}

init();
</script>
</body>
</html>
