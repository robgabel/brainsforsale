<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainsForSale — Explore</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface-2: #1c1c2e;
      --border: #2a2a3e;
      --text: #e8e8f0;
      --text-dim: #8888a0;
      --accent: #6366f1;
      --contradicts: #f87171;
      --subtle: rgba(230, 230, 240, 0.05);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .brain-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .stats {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .search-box {
      margin: 20px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface-2);
    }

    .search-box input::placeholder {
      color: var(--text-dim);
    }

    .cluster-label {
      padding: 0 20px;
      margin-top: 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .clusters {
      padding: 8px 12px;
      flex: 1;
      overflow-y: auto;
    }

    .cluster-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin: 4px 0;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
    }

    .cluster-item:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .cluster-item.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .cluster-item.active .cluster-count {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    /* Sidebar modes per tab */
    .sidebar .atoms-nav { display: none; }
    .sidebar .section-nav { display: none; }
    .sidebar.mode-atoms .atoms-nav { display: contents; }
    .sidebar.mode-synthesis .section-nav { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
    .sidebar.mode-skills .atoms-nav { display: none; }
    .sidebar.mode-skills .section-nav { display: none; }

    .cluster-count {
      margin-left: auto;
      background: var(--surface-2);
      color: var(--text-dim);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Section nav for synthesis tab */
    .section-nav {
      padding: 8px 12px;
    }

    .section-nav-label {
      padding: 0 12px;
      margin-top: 12px;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .section-nav-item {
      display: block;
      padding: 10px 12px;
      margin: 2px 0;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
      line-height: 1.4;
    }

    .section-nav-item:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .section-nav-item.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Expandable atom cards */
    .atom-card {
      cursor: pointer;
    }

    .atom-card.expanded {
      border-color: var(--accent);
      box-shadow: 0 0 24px rgba(99, 102, 241, 0.15);
    }

    .connections-panel {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .connections-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .connection-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .connection-item:hover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.05);
    }

    .conn-type {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .conn-type.supports { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .conn-type.extends { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
    .conn-type.contradicts { background: rgba(248, 113, 113, 0.15); color: #f87171; }
    .conn-type.related { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .conn-type.inspired_by { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }

    .conn-text {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .no-connections {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
      padding: 8px 0;
    }

    /* ===== MAIN AREA ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
      height: 60px;
    }

    .tab-bar {
      display: flex;
      gap: 12px;
      height: 100%;
      align-items: center;
    }

    .tab {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--text);
      background: rgba(230, 230, 240, 0.05);
    }

    .tab.active {
      color: white;
      background: var(--accent);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      padding-right: 48px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* ===== TAB 1: SYNTHESIS ===== */
    .hero-section {
      margin-bottom: 48px;
    }

    .hero-title {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .hero-tagline {
      font-size: 20px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .hero-bio {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 24px;
      max-width: 800px;
    }

    .hero-updated {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 32px;
      padding: 12px 16px;
      background: var(--subtle);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
    }

    .stats-bar {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-value {
      color: var(--accent);
      font-weight: 600;
    }

    .section-title {
      font-size: 28px;
      font-weight: 700;
      margin: 48px 0 24px 0;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .principles-grid {
      display: grid;
      gap: 20px;
      margin-bottom: 32px;
    }

    .principle-card {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      border-left: 4px solid var(--accent);
      transition: all 0.2s;
    }

    .principle-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }

    .principle-num {
      display: inline-block;
      background: var(--accent);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .principle-title {
      font-weight: 700;
      margin-bottom: 8px;
      color: white;
    }

    .principle-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .pattern-card {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      border-left: 4px solid #60a5fa;
      margin-bottom: 16px;
    }

    .pattern-name {
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 8px;
    }

    .pattern-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .contrarian-card {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      border-left: 4px solid var(--contradicts);
      margin-bottom: 16px;
    }

    .contrarian-title {
      font-weight: 700;
      color: var(--contradicts);
      margin-bottom: 8px;
    }

    .contrarian-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .belief-card {
      padding: 20px;
      background: rgba(136, 136, 160, 0.08);
      border: 1px solid rgba(136, 136, 160, 0.2);
      border-radius: 8px;
      border-left: 4px solid var(--text-dim);
      margin-bottom: 16px;
      opacity: 0.85;
    }

    .belief-title {
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      font-style: italic;
    }

    .belief-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .timeline {
      margin-bottom: 32px;
    }

    .timeline-entry {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      padding-left: 32px;
      position: relative;
    }

    .timeline-entry::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 24px;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .timeline-date {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
      font-size: 14px;
    }

    .timeline-role {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .timeline-lesson {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== TAB 2: ATOMS ===== */
    .atoms-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .atom-card {
      padding: 24px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.2s;
    }

    .atom-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }

    .atom-header {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .atom-cluster-tag {
      display: inline-block;
      background: var(--subtle);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .atom-content {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .atom-quote {
      padding: 12px 16px;
      margin: 12px 0;
      border-left: 3px solid var(--accent);
      background: rgba(99, 102, 241, 0.05);
      font-style: italic;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .atom-implication {
      margin-top: 12px;
      padding: 12px;
      background: rgba(96, 165, 250, 0.05);
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.6;
    }

    .atom-implication-label {
      font-weight: 600;
      color: #60a5fa;
      margin-bottom: 4px;
    }

    .atom-implication-text {
      color: var(--text-dim);
    }

    .atom-footer {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .confidence-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .confidence-high {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .confidence-medium {
      background: rgba(251, 146, 60, 0.15);
      color: #fb923c;
    }

    .confidence-low {
      background: rgba(168, 85, 247, 0.15);
      color: #a855f7;
    }

    .topic-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .topic-chip {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .topic-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .no-results {
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
    }

    /* ===== TAB 3: SKILLS ===== */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }

    .skill-card {
      padding: 24px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.2s;
    }

    .skill-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }

    .skill-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .skill-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .skill-desc {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .skill-example {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      color: var(--accent);
      overflow-x: auto;
      line-height: 1.4;
    }

    .workflows-section {
      margin-top: 48px;
    }

    .workflows-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .workflow-chain {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .workflow-name {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .workflow-path {
      color: var(--text-dim);
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 14px;
      line-height: 2;
    }

    .workflow-arrow {
      color: var(--accent);
      margin: 0 8px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1200px) {
      .skills-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        max-height: 200px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-direction: row;
        padding: 16px;
      }

      .sidebar-header {
        padding: 0;
        border: none;
        margin-right: 24px;
      }

      .search-box {
        margin: 0;
        flex: 1;
      }

      .topbar {
        padding: 0 16px;
      }

      .content {
        padding: 20px;
        padding-right: 20px;
      }

      .hero-title {
        font-size: 32px;
      }

      .section-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-label">BrainsForSale</div>
        <div class="brain-name" id="brainName"></div>
        <div class="stats" id="stats"></div>
      </div>

      <!-- ATOMS NAV -->
      <div class="atoms-nav">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search atoms..."
            autocomplete="off"
          >
        </div>
        <div class="cluster-label">Clusters</div>
        <div class="clusters" id="clusters"></div>
      </div>

      <!-- SECTION NAV (synthesis tab) -->
      <div class="section-nav" id="sectionNav">
        <div class="section-nav-label">Navigate</div>
      </div>
    </div>

    <!-- MAIN AREA -->
    <div class="main">
      <div class="topbar">
        <div class="tab-bar">
          <button class="tab active" data-tab="synthesis">How They Think</button>
          <button class="tab" data-tab="atoms">Atoms</button>
          <button class="tab" data-tab="skills">Skills</button>
        </div>
      </div>

      <div class="content">
        <!-- TAB 1: SYNTHESIS (rendered dynamically from brain-atoms.json) -->
        <div class="tab-content active" id="synthesis"></div>

        <!-- TAB 2: ATOMS -->
        <div class="tab-content" id="atoms">
          <div class="atoms-grid" id="atomsGrid"></div>
          <div class="no-results" id="noResults" style="display: none;">
            No atoms match your search. Try a different query.
          </div>
        </div>

        <!-- TAB 3: SKILLS -->
        <div class="tab-content" id="skills">
          <div class="skills-grid" id="skillsGrid"></div>
          <div class="workflows-section">
            <div class="workflows-title">Workflows</div>
            <div class="workflow-chain">
              <div class="workflow-name">Decide</div>
              <div class="workflow-path">/advise <span class="workflow-arrow">&rarr;</span> /debate <span class="workflow-arrow">&rarr;</span> /apply</div>
            </div>
            <div class="workflow-chain">
              <div class="workflow-name">Learn</div>
              <div class="workflow-path">/teach <span class="workflow-arrow">&rarr;</span> /deep-dive <span class="workflow-arrow">&rarr;</span> /evolve</div>
            </div>
            <div class="workflow-chain">
              <div class="workflow-name">Create</div>
              <div class="workflow-path">/surprise <span class="workflow-arrow">&rarr;</span> /connect <span class="workflow-arrow">&rarr;</span> /mashup</div>
            </div>
            <div class="workflow-chain">
              <div class="workflow-name">Research</div>
              <div class="workflow-path">/deep-dive <span class="workflow-arrow">&rarr;</span> /mashup <span class="workflow-arrow">&rarr;</span> /brainfight</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let atomsData = [];
    let connectionsData = [];
    let brainMeta = {};
    let synthesisMeta = {};
    let atomMap = {};
    let clusters = new Set();
    let filteredAtoms = [];
    let currentCluster = null;
    let currentSearch = '';
    let expandedAtomId = null;

    // ===== SIDEBAR MODE MANAGEMENT =====
    function setSidebarMode(mode) {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.remove('mode-atoms', 'mode-synthesis', 'mode-skills');
      sidebar.classList.add('mode-' + mode);
    }

    // ===== SECTION NAV (built dynamically from synthesis data) =====
    let sections = [];

    function buildSectionNav() {
      const nav = document.getElementById('sectionNav');
      sections.forEach(sec => {
        const btn = document.createElement('button');
        btn.className = 'section-nav-item';
        btn.textContent = sec.label;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.section-nav-item').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const target = document.getElementById(sec.id);
          if (target) {
            const content = document.querySelector('.content');
            const offset = target.offsetTop - content.offsetTop - 20;
            content.scrollTo({ top: offset, behavior: 'smooth' });
          }
        });
        nav.appendChild(btn);
      });
    }

    function setupScrollSpy() {
      const content = document.querySelector('.content');
      content.addEventListener('scroll', () => {
        if (!document.getElementById('synthesis').classList.contains('active')) return;
        const scrollTop = content.scrollTop + content.offsetTop + 60;
        let activeIdx = 0;
        sections.forEach((sec, i) => {
          const el = document.getElementById(sec.id);
          if (el && el.offsetTop <= scrollTop) activeIdx = i;
        });
        document.querySelectorAll('.section-nav-item').forEach((btn, i) => {
          btn.classList.toggle('active', i === activeIdx);
        });
      });
    }

    // ===== TAB SWITCHING =====
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        const tabName = e.target.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(content => {
          content.classList.remove('active');
        });
        document.getElementById(tabName).classList.add('active');

        if (tabName === 'atoms') {
          setSidebarMode('atoms');
        } else if (tabName === 'synthesis') {
          setSidebarMode('synthesis');
        } else {
          setSidebarMode('skills');
        }
      });
    });

    // ===== RENDER SYNTHESIS TAB (fully data-driven) =====
    function renderSynthesis() {
      const container = document.getElementById('synthesis');
      const s = synthesisMeta;
      if (!s || !s.first_principles) {
        container.innerHTML = '<p style="color: var(--text-dim);">No synthesis data available for this brain.</p>';
        return;
      }

      let html = '';

      // Hero section
      html += `
        <div class="hero-section">
          <div class="hero-title">${brainMeta.name || ''}</div>
          ${s.hero_tagline ? `<div class="hero-tagline">${s.hero_tagline}</div>` : ''}
          <div class="hero-bio">${brainMeta.bio || ''}</div>
          ${s.hero_updated ? `<div class="hero-updated">${s.hero_updated}</div>` : ''}
          <div class="stats-bar">
            <div class="stat-item"><span class="stat-value">${brainMeta.atom_count || 0}</span> atoms</div>
            <div class="stat-item"><span class="stat-value">${brainMeta.connection_count || 0}</span> connections</div>
            <div class="stat-item"><span class="stat-value">${brainMeta.cluster_count || 0}</span> clusters</div>
            ${brainMeta.coverage ? `<div class="stat-item">${brainMeta.coverage}</div>` : ''}
          </div>
        </div>
      `;

      // Build section registry for nav
      sections = [];

      // First Principles
      if (s.first_principles && s.first_principles.length > 0) {
        sections.push({ id: 'sec-first-principles', label: 'First Principles' });
        html += '<div class="section-title" id="sec-first-principles">First Principles</div>';
        html += '<div class="principles-grid">';
        s.first_principles.forEach((p, i) => {
          html += `
            <div class="principle-card">
              <div style="display: flex; align-items: baseline;">
                <div class="principle-num">${i + 1}</div>
                <div class="principle-title">${esc(p.title)}</div>
              </div>
              <div class="principle-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
        html += '</div>';
      }

      // Thinking Patterns
      if (s.thinking_patterns && s.thinking_patterns.length > 0) {
        sections.push({ id: 'sec-thinking-patterns', label: 'Thinking Patterns' });
        html += '<div class="section-title" id="sec-thinking-patterns">Thinking Patterns</div>';
        s.thinking_patterns.forEach(p => {
          html += `
            <div class="pattern-card">
              <div class="pattern-name">${esc(p.name)}</div>
              <div class="pattern-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
      }

      // Contrarian Positions
      if (s.contrarian_positions && s.contrarian_positions.length > 0) {
        sections.push({ id: 'sec-contrarian', label: 'Contrarian Positions' });
        html += '<div class="section-title" id="sec-contrarian">Contrarian Positions</div>';
        s.contrarian_positions.forEach(p => {
          html += `
            <div class="contrarian-card">
              <div class="contrarian-title">${esc(p.title)}</div>
              <div class="contrarian-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
      }

      // Does NOT Believe
      if (s.does_not_believe && s.does_not_believe.length > 0) {
        sections.push({ id: 'sec-not-believe', label: 'Does NOT Believe' });
        html += '<div class="section-title" id="sec-not-believe">What ' + esc(brainMeta.possessive === 'her' ? 'She' : 'He') + ' Does NOT Believe</div>';
        s.does_not_believe.forEach(p => {
          html += `
            <div class="belief-card">
              <div class="belief-title">${esc(p.title)}</div>
              <div class="belief-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
      }

      // Would NOT Say
      if (s.would_not_say && s.would_not_say.length > 0) {
        sections.push({ id: 'sec-would-not-say', label: 'Would NOT Say' });
        html += '<div class="section-title" id="sec-would-not-say">What This Brain Would NOT Say</div>';
        s.would_not_say.forEach(p => {
          html += `
            <div class="belief-card">
              <div class="belief-title">${esc(p.title)}</div>
              <div class="belief-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
      }

      // Biography
      if (s.biography && s.biography.length > 0) {
        sections.push({ id: 'sec-biography', label: 'Biography' });
        html += '<div class="section-title" id="sec-biography">Biographical Pattern</div>';
        html += '<div class="timeline">';
        s.biography.forEach(entry => {
          html += `
            <div class="timeline-entry">
              <div class="timeline-date">${esc(entry.date)}</div>
              <div class="timeline-role">${esc(entry.role)}</div>
              <div class="timeline-lesson">${esc(entry.lesson)}</div>
            </div>
          `;
        });
        html += '</div>';
      }

      container.innerHTML = html;

      // Build section nav after we know the sections
      buildSectionNav();
      setupScrollSpy();
    }

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== LOAD DATA =====
    async function loadData() {
      let raw;
      try {
        const response = await fetch('brain-atoms.json');
        raw = await response.json();
      } catch (err) {
        console.log('Fetch failed, trying XHR...');
        raw = await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', 'brain-atoms.json', true);
          xhr.onload = () => resolve(JSON.parse(xhr.responseText));
          xhr.onerror = reject;
          xhr.send();
        });
      }
      brainMeta = raw.brain || {};
      synthesisMeta = raw.synthesis || {};
      atomsData = raw.atoms || [];
      connectionsData = raw.connections || [];
      atomsData.forEach(a => { atomMap[a.id] = a; });

      // Set brain name in sidebar
      document.getElementById('brainName').textContent = brainMeta.name || 'Brain';

      // Update synthesis tab label
      const synthesisTab = document.querySelector('.tab[data-tab="synthesis"]');
      if (synthesisTab && brainMeta.name) {
        const lastName = brainMeta.name.split(' ').pop();
        synthesisTab.textContent = 'How ' + lastName + ' Thinks';
      }

      renderSynthesis();
      initializeAtoms();
      renderSkills();
    }

    // ===== ATOMS =====
    function initializeAtoms() {
      const clusterCounts = {};
      atomsData.forEach(atom => {
        if (atom.cluster) {
          clusters.add(atom.cluster);
          clusterCounts[atom.cluster] = (clusterCounts[atom.cluster] || 0) + 1;
        }
      });

      const sortedClusters = Array.from(clusters).sort((a, b) => (clusterCounts[b] || 0) - (clusterCounts[a] || 0));

      const clustersDiv = document.getElementById('clusters');
      const allBtn = document.createElement('button');
      allBtn.className = 'cluster-item active';
      allBtn.innerHTML = `<span>All Clusters</span><span class="cluster-count">${atomsData.length}</span>`;
      allBtn.addEventListener('click', () => {
        currentCluster = null;
        document.querySelectorAll('.cluster-item').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
        applyFilters();
      });
      clustersDiv.appendChild(allBtn);

      sortedClusters.forEach(cluster => {
        const btn = document.createElement('button');
        btn.className = 'cluster-item';
        btn.innerHTML = `<span>${cluster}</span><span class="cluster-count">${clusterCounts[cluster]}</span>`;
        btn.addEventListener('click', () => filterByCluster(cluster, btn));
        clustersDiv.appendChild(btn);
      });

      renderAtoms(atomsData);

      const statsDiv = document.getElementById('stats');
      statsDiv.innerHTML = `
        <div><strong>${atomsData.length}</strong> atoms</div>
        <div><strong>${connectionsData.length}</strong> connections</div>
        <div><strong>${clusters.size}</strong> clusters</div>
      `;
    }

    function filterByCluster(cluster, btn) {
      if (currentCluster === cluster) {
        currentCluster = null;
        document.querySelectorAll('.cluster-item').forEach(b => b.classList.remove('active'));
        document.querySelector('.cluster-item').classList.add('active');
      } else {
        document.querySelectorAll('.cluster-item').forEach(b => b.classList.remove('active'));
        currentCluster = cluster;
        btn.classList.add('active');
      }
      applyFilters();
    }

    function applyFilters() {
      filteredAtoms = atomsData.filter(atom => {
        const matchesCluster = !currentCluster || atom.cluster === currentCluster;
        const matchesSearch = !currentSearch ||
          atom.content.toLowerCase().includes(currentSearch.toLowerCase()) ||
          (atom.original_quote && atom.original_quote.toLowerCase().includes(currentSearch.toLowerCase())) ||
          (atom.implication && atom.implication.toLowerCase().includes(currentSearch.toLowerCase())) ||
          (atom.topics && atom.topics.some(t => t.toLowerCase().includes(currentSearch.toLowerCase())));
        return matchesCluster && matchesSearch;
      });
      renderAtoms(filteredAtoms);
    }

    function getAtomConnections(atom) {
      const conns = [];
      if (atom.connections && atom.connections.length > 0) {
        atom.connections.forEach(c => {
          const targetAtom = atomMap[c.target_id];
          if (targetAtom) {
            conns.push({ type: c.relationship || c.type, atom: targetAtom });
          }
        });
      }
      connectionsData.forEach(c => {
        if (c.atom_id_1 === atom.id) {
          const targetAtom = atomMap[c.atom_id_2];
          if (targetAtom && !conns.find(x => x.atom.id === targetAtom.id)) {
            conns.push({ type: c.relationship, atom: targetAtom });
          }
        }
        if (c.atom_id_2 === atom.id) {
          const sourceAtom = atomMap[c.atom_id_1];
          if (sourceAtom && !conns.find(x => x.atom.id === sourceAtom.id)) {
            conns.push({ type: c.relationship, atom: sourceAtom });
          }
        }
      });
      return conns;
    }

    function renderConnections(atom) {
      const conns = getAtomConnections(atom);
      if (conns.length === 0) {
        return '<div class="no-connections">No connections mapped for this atom.</div>';
      }

      let html = '';
      const grouped = {};
      conns.forEach(c => {
        const t = c.type || 'related';
        if (!grouped[t]) grouped[t] = [];
        grouped[t].push(c);
      });

      const typeOrder = ['supports', 'extends', 'contradicts', 'related', 'inspired_by'];
      typeOrder.forEach(type => {
        if (!grouped[type]) return;
        grouped[type].forEach(c => {
          const preview = c.atom.content.length > 120 ? c.atom.content.slice(0, 120) + '...' : c.atom.content;
          html += `
            <div class="connection-item" onclick="navigateToAtom('${c.atom.id}')">
              <span class="conn-type ${type}">${type.replace('_', ' ')}</span>
              <span class="conn-text">${esc(preview)}</span>
            </div>
          `;
        });
      });

      return html;
    }

    function navigateToAtom(atomId) {
      const atom = atomMap[atomId];
      if (!atom) return;

      const atomsTab = document.querySelector('.tab[data-tab="atoms"]');
      if (!document.getElementById('atoms').classList.contains('active')) {
        atomsTab.click();
      }

      if (atom.cluster && atom.cluster !== currentCluster) {
        currentCluster = atom.cluster;
        document.querySelectorAll('.cluster-item').forEach(b => {
          b.classList.remove('active');
          if (b.querySelector('span') && b.querySelector('span').textContent === atom.cluster) {
            b.classList.add('active');
          }
        });
        applyFilters();
      }

      expandedAtomId = atomId;
      renderAtoms(filteredAtoms);

      setTimeout(() => {
        const card = document.getElementById('atom-' + atomId);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    }

    function toggleAtom(atomId) {
      expandedAtomId = expandedAtomId === atomId ? null : atomId;
      renderAtoms(filteredAtoms.length > 0 || currentCluster || currentSearch ? filteredAtoms : atomsData);
    }

    function renderAtoms(atoms) {
      const grid = document.getElementById('atomsGrid');
      const noResults = document.getElementById('noResults');

      grid.innerHTML = '';

      if (atoms.length === 0) {
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';

      atoms.forEach((atom) => {
        const card = document.createElement('div');
        const isExpanded = expandedAtomId === atom.id;
        card.className = 'atom-card' + (isExpanded ? ' expanded' : '');
        card.id = 'atom-' + atom.id;

        let html = `
          <div class="atom-header" onclick="toggleAtom('${atom.id}')">
            <div class="atom-cluster-tag">${atom.cluster || 'uncategorized'}</div>
          </div>
          <div class="atom-content" onclick="toggleAtom('${atom.id}')">${esc(atom.content)}</div>
        `;

        if (atom.original_quote) {
          html += `<div class="atom-quote">"${esc(atom.original_quote)}"</div>`;
        }

        if (atom.implication) {
          html += `
            <div class="atom-implication">
              <div class="atom-implication-label">Implication:</div>
              <div class="atom-implication-text">${esc(atom.implication)}</div>
            </div>
          `;
        }

        html += '<div class="atom-footer">';

        if (atom.confidence_tier) {
          const tier = (atom.confidence_tier || 'medium').toUpperCase();
          const tierClass = 'confidence-' + atom.confidence_tier.toLowerCase();
          html += `<div class="confidence-badge ${tierClass}">${tier}</div>`;
        }

        if (atom.topics && atom.topics.length > 0) {
          html += '<div class="topic-chips">';
          atom.topics.forEach(topic => {
            html += `<button class="topic-chip" onclick="event.stopPropagation(); searchTopic('${topic.replace(/'/g, "\\'")}')">${esc(topic)}</button>`;
          });
          html += '</div>';
        }

        html += '</div>';

        if (isExpanded) {
          const connCount = getAtomConnections(atom).length;
          html += `
            <div class="connections-panel">
              <div class="connections-label">Connections (${connCount})</div>
              ${renderConnections(atom)}
            </div>
          `;
        }

        card.innerHTML = html;
        grid.appendChild(card);
      });
    }

    function searchTopic(topic) {
      document.getElementById('searchInput').value = topic;
      currentSearch = topic;
      currentCluster = null;
      document.querySelectorAll('.cluster-item').forEach(b => b.classList.remove('active'));
      document.querySelector('.cluster-item').classList.add('active');
      applyFilters();
    }

    // ===== SEARCH INPUT =====
    document.getElementById('searchInput').addEventListener('keyup', (e) => {
      currentSearch = e.target.value;
      applyFilters();
    });

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.getElementById('atoms').classList.contains('active')) {
        e.preventDefault();
        document.getElementById('searchInput').focus();
      }
      if (e.key === 'Escape') {
        document.getElementById('searchInput').value = '';
        currentSearch = '';
        expandedAtomId = null;
        applyFilters();
      }
    });

    // ===== SKILLS (data-driven from brain-atoms.json) =====
    function renderSkills() {
      const grid = document.getElementById('skillsGrid');
      const skillsList = synthesisMeta.skills || [];

      if (skillsList.length === 0) {
        // Fallback: default 10 skills
        return;
      }

      skillsList.forEach(skill => {
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
          <div class="skill-name">/${esc(skill.name)}</div>
          <div class="skill-title">${esc(skill.title)}</div>
          <div class="skill-desc">${esc(skill.desc)}</div>
          <div class="skill-example">${esc(skill.example)}</div>
        `;
        grid.appendChild(card);
      });
    }

    // ===== INIT =====
    setSidebarMode('synthesis');
    loadData();
  </script>
</body>
</html>
