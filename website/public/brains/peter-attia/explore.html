<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainsFor — Explore</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #14141f;
      --surface-2: #1c1c2e;
      --border: #2a2a3e;
      --text: #e8e8f0;
      --text-dim: #8888a0;
      --accent: #6366f1;
      --contradicts: #f87171;
      --subtle: rgba(230, 230, 240, 0.05);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .brain-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .stats {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .search-box {
      margin: 20px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface-2);
    }

    .search-box input::placeholder {
      color: var(--text-dim);
    }

    .cluster-label {
      padding: 0 20px;
      margin-top: 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .clusters {
      padding: 8px 12px;
      flex: 1;
      overflow-y: auto;
    }

    .cluster-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin: 4px 0;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
    }

    .cluster-item:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .cluster-item.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .cluster-item.active .cluster-count {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    /* Sidebar modes per tab */
    .sidebar .atoms-nav { display: none; }
    .sidebar .section-nav { display: none; }
    .sidebar.mode-atoms .atoms-nav { display: contents; }
    .sidebar.mode-synthesis .section-nav { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
    .sidebar.mode-skills .atoms-nav { display: none; }
    .sidebar.mode-skills .section-nav { display: none; }

    .cluster-count {
      margin-left: auto;
      background: var(--surface-2);
      color: var(--text-dim);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Section nav for synthesis tab */
    .section-nav {
      padding: 8px 12px;
    }

    .section-nav-label {
      padding: 0 12px;
      margin-top: 12px;
      margin-bottom: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .section-nav-item {
      display: block;
      padding: 10px 12px;
      margin: 2px 0;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      text-align: left;
      width: 100%;
      line-height: 1.4;
    }

    .section-nav-item:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }

    .section-nav-item.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Expandable atom cards */
    .atom-card {
      cursor: pointer;
    }

    .atom-card.expanded {
      border-color: var(--accent);
      box-shadow: 0 0 24px rgba(99, 102, 241, 0.15);
    }

    .connections-panel {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .connections-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .connection-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .connection-item:hover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.05);
    }

    .conn-type {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .conn-type.supports { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .conn-type.extends { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
    .conn-type.contradicts { background: rgba(248, 113, 113, 0.15); color: #f87171; }
    .conn-type.related { background: rgba(168, 85, 247, 0.15); color: #a855f7; }
    .conn-type.inspired_by { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }

    .conn-text {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .no-connections {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
      padding: 8px 0;
    }

    .atom-expand-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 12px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .atom-card:hover .atom-expand-hint {
      opacity: 1;
      color: var(--accent);
    }
    .atom-expand-hint svg {
      transition: transform 0.2s;
    }
    .atom-card.expanded .atom-expand-hint svg {
      transform: rotate(180deg);
    }

    .atom-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .atom-meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .atom-meta-item a {
      color: var(--accent);
      text-decoration: none;
    }
    .atom-meta-item a:hover {
      text-decoration: underline;
    }

    /* ===== MAIN AREA ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
      height: 60px;
    }

    .tab-bar {
      display: flex;
      gap: 12px;
      height: 100%;
      align-items: center;
    }

    .tab {
      background: transparent;
      border: none;
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--text);
      background: rgba(230, 230, 240, 0.05);
    }

    .tab.active {
      color: white;
      background: var(--accent);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      padding-right: 48px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .tab-content#graph.active {
      display: block;
      overflow: hidden;
    }

    /* ===== TAB 1: SYNTHESIS ===== */
    .hero-section {
      margin-bottom: 48px;
    }

    .hero-title {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .hero-tagline {
      font-size: 20px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .hero-bio {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 24px;
      max-width: 800px;
    }

    .hero-updated {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 32px;
      padding: 12px 16px;
      background: var(--subtle);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
    }

    .stats-bar {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-value {
      color: var(--accent);
      font-weight: 600;
    }

    .section-title {
      font-size: 28px;
      font-weight: 700;
      margin: 48px 0 24px 0;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .principles-grid {
      display: grid;
      gap: 20px;
      margin-bottom: 32px;
    }

    .principle-card {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      border-left: 4px solid var(--accent);
      transition: all 0.2s;
    }

    .principle-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }

    .principle-num {
      display: inline-block;
      background: var(--accent);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .principle-title {
      font-weight: 700;
      margin-bottom: 8px;
      color: white;
    }

    .principle-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .pattern-card {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      border-left: 4px solid #60a5fa;
      margin-bottom: 16px;
    }

    .pattern-name {
      font-weight: 700;
      color: #60a5fa;
      margin-bottom: 8px;
    }

    .pattern-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .contrarian-card {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      border-left: 4px solid var(--contradicts);
      margin-bottom: 16px;
    }

    .contrarian-title {
      font-weight: 700;
      color: var(--contradicts);
      margin-bottom: 8px;
    }

    .contrarian-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .belief-card {
      padding: 20px;
      background: rgba(136, 136, 160, 0.08);
      border: 1px solid rgba(136, 136, 160, 0.2);
      border-radius: 8px;
      border-left: 4px solid var(--text-dim);
      margin-bottom: 16px;
      opacity: 0.85;
    }

    .belief-title {
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      font-style: italic;
    }

    .belief-desc {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .timeline {
      margin-bottom: 32px;
    }

    .timeline-entry {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      padding-left: 32px;
      position: relative;
    }

    .timeline-entry::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 24px;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .timeline-date {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
      font-size: 14px;
    }

    .timeline-role {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .timeline-lesson {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    /* ===== TAB 2: ATOMS ===== */
    .atoms-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .atom-card {
      padding: 24px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.2s;
    }

    .atom-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }

    .atom-header {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .atom-cluster-tag {
      display: inline-block;
      background: var(--subtle);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }

    .atom-content {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .atom-quote {
      padding: 12px 16px;
      margin: 12px 0;
      border-left: 3px solid var(--accent);
      background: rgba(99, 102, 241, 0.05);
      font-style: italic;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
    }

    .atom-implication {
      margin-top: 12px;
      padding: 12px;
      background: rgba(96, 165, 250, 0.05);
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.6;
    }

    .atom-implication-label {
      font-weight: 600;
      color: #60a5fa;
      margin-bottom: 4px;
    }

    .atom-implication-text {
      color: var(--text-dim);
    }

    .atom-footer {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .confidence-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .confidence-high {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .confidence-medium {
      background: rgba(251, 146, 60, 0.15);
      color: #fb923c;
    }

    .confidence-low {
      background: rgba(168, 85, 247, 0.15);
      color: #a855f7;
    }

    .topic-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .topic-chip {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .topic-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .no-results {
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
    }

    /* ===== TAB 3: SKILLS ===== */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }

    .skill-card {
      padding: 24px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.2s;
    }

    .skill-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
    }

    .skill-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    .skill-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .skill-desc {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .skill-example {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      color: var(--accent);
      overflow-x: auto;
      line-height: 1.4;
    }

    .workflows-section {
      margin-top: 48px;
    }

    .workflows-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .workflow-chain {
      padding: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .workflow-name {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .workflow-path {
      color: var(--text-dim);
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 14px;
      line-height: 2;
    }

    .workflow-arrow {
      color: var(--accent);
      margin: 0 8px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }

    /* ===== TAB 4: GRAPH ===== */
    #graph-tab {
      position: relative;
      height: 100%;
    }

    #graph-canvas {
      width: 100%;
      height: calc(100vh - 60px);
      display: block;
    }

    .graph-tooltip {
      position: absolute;
      pointer-events: none;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px 16px;
      max-width: 340px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 100;
      display: none;
    }

    .graph-tooltip .tt-cluster {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 6px;
    }

    .graph-tooltip .tt-content {
      color: var(--text);
      margin-bottom: 6px;
    }

    .graph-tooltip .tt-quote {
      font-style: italic;
      color: var(--text-dim);
      font-size: 12px;
      border-left: 2px solid var(--accent);
      padding-left: 8px;
    }

    .graph-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .graph-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .graph-btn:hover {
      border-color: var(--accent);
      background: var(--surface-2);
    }

    .graph-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .graph-legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      display: flex;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--text-dim);
      z-index: 10;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .legend-line {
      width: 20px;
      height: 2px;
    }

    /* Surprise Me floating button */
    .surprise-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.4);
      transition: all 0.2s;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .surprise-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.5);
    }

    .surprise-btn:active {
      transform: scale(0.97);
    }

    /* Surprise modal */
    .surprise-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 15, 0.85);
      z-index: 300;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .surprise-overlay.visible {
      display: flex;
    }

    .surprise-card {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 32px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 16px 64px rgba(99, 102, 241, 0.3);
      animation: surpriseIn 0.3s ease-out;
    }

    @keyframes surpriseIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .surprise-card .sc-cluster {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .surprise-card .sc-content {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .surprise-card .sc-quote {
      font-style: italic;
      color: var(--text-dim);
      font-size: 15px;
      border-left: 3px solid var(--accent);
      padding: 12px 16px;
      background: rgba(99, 102, 241, 0.05);
      border-radius: 0 6px 6px 0;
      margin-bottom: 16px;
    }

    .surprise-card .sc-connections {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .surprise-card .sc-conn-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 8px 0;
      cursor: pointer;
    }

    .surprise-card .sc-conn-item:hover .conn-text {
      color: var(--text);
    }

    .surprise-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .surprise-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .surprise-actions .btn-another {
      background: var(--accent);
      border: none;
      color: white;
    }

    .surprise-actions .btn-another:hover {
      background: #818cf8;
    }

    .surprise-actions .btn-close {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .surprise-actions .btn-close:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .surprise-actions .btn-explore {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .surprise-actions .btn-explore:hover {
      background: var(--accent);
      color: white;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1200px) {
      .skills-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        max-height: 200px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-direction: row;
        padding: 16px;
      }

      .sidebar-header {
        padding: 0;
        border: none;
        margin-right: 24px;
      }

      .search-box {
        margin: 0;
        flex: 1;
      }

      .topbar {
        padding: 0 16px;
      }

      .content {
        padding: 20px;
        padding-right: 20px;
      }

      .hero-title {
        font-size: 32px;
      }

      .section-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-label">BrainsFor</div>
        <div class="brain-name" id="brainName"></div>
        <div class="stats" id="stats"></div>
      </div>

      <!-- ATOMS NAV -->
      <div class="atoms-nav">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search atoms..."
            autocomplete="off"
          >
        </div>
        <div class="cluster-label">Clusters</div>
        <div class="clusters" id="clusters"></div>
      </div>

      <!-- SECTION NAV (synthesis tab) -->
      <div class="section-nav" id="sectionNav">
        <div class="section-nav-label">Navigate</div>
      </div>
    </div>

    <!-- MAIN AREA -->
    <div class="main">
      <div class="topbar">
        <div class="tab-bar">
          <button class="tab active" data-tab="synthesis">How They Think</button>
          <button class="tab" data-tab="atoms">Atoms</button>
          <button class="tab" data-tab="skills">Skills</button>
          <button class="tab" data-tab="graph">Visualize</button>
        </div>
      </div>

      <div class="content">
        <!-- TAB 1: SYNTHESIS (rendered dynamically from brain-atoms.json) -->
        <div class="tab-content active" id="synthesis"></div>

        <!-- TAB 2: GRAPH -->
        <div class="tab-content" id="graph" style="padding: 0; height: 100%; position: relative;">
          <canvas id="graph-canvas"></canvas>
          <div class="graph-tooltip" id="graphTooltip"></div>
          <div class="graph-controls">
            <button class="graph-btn active" onclick="setGraphFilter(null, this)">All</button>
            <button class="graph-btn" onclick="setGraphFilter('supports', this)">Supports</button>
            <button class="graph-btn" onclick="setGraphFilter('extends', this)">Extends</button>
            <button class="graph-btn" onclick="setGraphFilter('contradicts', this)">Contradicts</button>
            <button class="graph-btn" onclick="setGraphFilter('inspired_by', this)">Inspired By</button>
            <button class="graph-btn" onclick="setGraphFilter('related', this)">Related</button>
            <button class="graph-btn" style="margin-left: 8px; background: var(--accent); border-color: var(--accent); color: white;" onclick="surpriseGraph()">✨ Surprise</button>
          </div>
          <div class="graph-legend">
            <div class="legend-item"><div class="legend-dot" style="background: #6366f1;"></div> Supports</div>
            <div class="legend-item"><div class="legend-dot" style="background: #60a5fa;"></div> Extends</div>
            <div class="legend-item"><div class="legend-dot" style="background: #f87171;"></div> Contradicts</div>
            <div class="legend-item"><div class="legend-dot" style="background: #fbbf24;"></div> Inspired By</div>
            <div class="legend-item"><div class="legend-dot" style="background: #a855f7;"></div> Related</div>
          </div>
        </div>

        <!-- TAB 3: ATOMS -->
        <div class="tab-content" id="atoms">
          <div class="atoms-grid" id="atomsGrid"></div>
          <div class="no-results" id="noResults" style="display: none;">
            No atoms match your search. Try a different query.
          </div>
        </div>

        <!-- TAB 4: SKILLS -->
        <div class="tab-content" id="skills">
          <div class="skills-grid" id="skillsGrid"></div>
          <div class="workflows-section">
            <div class="workflows-title">Workflows</div>
            <div class="workflow-chain">
              <div class="workflow-name">Decide</div>
              <div class="workflow-path">/advise <span class="workflow-arrow">&rarr;</span> /debate <span class="workflow-arrow">&rarr;</span> /coach</div>
            </div>
            <div class="workflow-chain">
              <div class="workflow-name">Learn</div>
              <div class="workflow-path">/teach <span class="workflow-arrow">&rarr;</span> /evolve <span class="workflow-arrow">&rarr;</span> /coach</div>
            </div>
            <div class="workflow-chain">
              <div class="workflow-name">Create</div>
              <div class="workflow-path">/surprise <span class="workflow-arrow">&rarr;</span> /connect <span class="workflow-arrow">&rarr;</span> /predict</div>
            </div>
            <div class="workflow-chain">
              <div class="workflow-name">Forecast</div>
              <div class="workflow-path">/predict <span class="workflow-arrow">&rarr;</span> /debate <span class="workflow-arrow">&rarr;</span> /advise</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Surprise Me button -->
  <button class="surprise-btn" onclick="showSurprise()">
    ✨ Surprise me
  </button>

  <!-- Surprise overlay -->
  <div class="surprise-overlay" id="surpriseOverlay" onclick="if(event.target===this) closeSurprise()">
    <div class="surprise-card" id="surpriseCard"></div>
  </div>

  <script>
    let atomsData = [];
    let connectionsData = [];
    let brainMeta = {};
    let synthesisMeta = {};
    let atomMap = {};
    let clusters = new Set();
    let filteredAtoms = [];
    let currentCluster = null;
    let currentSearch = '';
    let expandedAtomId = null;

    // ===== SIDEBAR MODE MANAGEMENT =====
    function setSidebarMode(mode) {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.remove('mode-atoms', 'mode-synthesis', 'mode-skills');
      sidebar.classList.add('mode-' + mode);
    }

    // ===== SECTION NAV (built dynamically from synthesis data) =====
    let sections = [];

    function buildSectionNav() {
      const nav = document.getElementById('sectionNav');
      sections.forEach(sec => {
        const btn = document.createElement('button');
        btn.className = 'section-nav-item';
        btn.textContent = sec.label;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.section-nav-item').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const target = document.getElementById(sec.id);
          if (target) {
            const content = document.querySelector('.content');
            const offset = target.offsetTop - content.offsetTop - 20;
            content.scrollTo({ top: offset, behavior: 'smooth' });
          }
        });
        nav.appendChild(btn);
      });
    }

    function setupScrollSpy() {
      const content = document.querySelector('.content');
      content.addEventListener('scroll', () => {
        if (!document.getElementById('synthesis').classList.contains('active')) return;
        const scrollTop = content.scrollTop + content.offsetTop + 60;
        let activeIdx = 0;
        sections.forEach((sec, i) => {
          const el = document.getElementById(sec.id);
          if (el && el.offsetTop <= scrollTop) activeIdx = i;
        });
        document.querySelectorAll('.section-nav-item').forEach((btn, i) => {
          btn.classList.toggle('active', i === activeIdx);
        });
      });
    }

    // ===== TAB SWITCHING =====
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', (e) => {
        const tabName = e.target.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(content => {
          content.classList.remove('active');
        });
        document.getElementById(tabName).classList.add('active');

        if (tabName === 'atoms') {
          setSidebarMode('atoms');
        } else if (tabName === 'synthesis') {
          setSidebarMode('synthesis');
        } else if (tabName === 'graph') {
          setSidebarMode('skills'); // hide sidebar nav for graph
          initGraph();
        } else {
          setSidebarMode('skills');
        }
      });
    });

    // ===== RENDER SYNTHESIS TAB (fully data-driven) =====
    function renderSynthesis() {
      const container = document.getElementById('synthesis');
      const s = synthesisMeta;
      if (!s || !s.first_principles) {
        container.innerHTML = '<p style="color: var(--text-dim);">No synthesis data available for this brain.</p>';
        return;
      }

      let html = '';

      // Hero section
      html += `
        <div class="hero-section">
          <div class="hero-title">${brainMeta.name || ''}</div>
          ${s.hero_tagline ? `<div class="hero-tagline">${s.hero_tagline}</div>` : ''}
          <div class="hero-bio">${brainMeta.bio || ''}</div>
          ${s.hero_updated ? `<div class="hero-updated">${s.hero_updated}</div>` : ''}
          <div class="stats-bar">
            <div class="stat-item"><span class="stat-value">${brainMeta.atom_count || 0}</span> atoms</div>
            <div class="stat-item"><span class="stat-value">${brainMeta.connection_count || 0}</span> connections</div>
            <div class="stat-item"><span class="stat-value">${brainMeta.cluster_count || 0}</span> clusters</div>
            ${brainMeta.coverage ? `<div class="stat-item">${brainMeta.coverage}</div>` : ''}
          </div>
        </div>
      `;

      // Build section registry for nav
      sections = [];

      // First Principles
      if (s.first_principles && s.first_principles.length > 0) {
        sections.push({ id: 'sec-first-principles', label: 'First Principles' });
        html += '<div class="section-title" id="sec-first-principles">First Principles</div>';
        html += '<div class="principles-grid">';
        s.first_principles.forEach((p, i) => {
          html += `
            <div class="principle-card">
              <div style="display: flex; align-items: baseline;">
                <div class="principle-num">${i + 1}</div>
                <div class="principle-title">${esc(p.title)}</div>
              </div>
              <div class="principle-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
        html += '</div>';
      }

      // Thinking Patterns
      if (s.thinking_patterns && s.thinking_patterns.length > 0) {
        sections.push({ id: 'sec-thinking-patterns', label: 'Thinking Patterns' });
        html += '<div class="section-title" id="sec-thinking-patterns">Thinking Patterns</div>';
        s.thinking_patterns.forEach(p => {
          html += `
            <div class="pattern-card">
              <div class="pattern-name">${esc(p.name)}</div>
              <div class="pattern-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
      }

      // Contrarian Positions
      if (s.contrarian_positions && s.contrarian_positions.length > 0) {
        sections.push({ id: 'sec-contrarian', label: 'Contrarian Positions' });
        html += '<div class="section-title" id="sec-contrarian">Contrarian Positions</div>';
        s.contrarian_positions.forEach(p => {
          html += `
            <div class="contrarian-card">
              <div class="contrarian-title">${esc(p.title)}</div>
              <div class="contrarian-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
      }

      // Does NOT Believe
      if (s.does_not_believe && s.does_not_believe.length > 0) {
        sections.push({ id: 'sec-not-believe', label: 'Does NOT Believe' });
        html += '<div class="section-title" id="sec-not-believe">What ' + esc(brainMeta.possessive === 'her' ? 'She' : 'He') + ' Does NOT Believe</div>';
        s.does_not_believe.forEach(p => {
          html += `
            <div class="belief-card">
              <div class="belief-title">${esc(p.title)}</div>
              <div class="belief-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
      }

      // Would NOT Say
      if (s.would_not_say && s.would_not_say.length > 0) {
        sections.push({ id: 'sec-would-not-say', label: 'Would NOT Say' });
        html += '<div class="section-title" id="sec-would-not-say">What This Brain Would NOT Say</div>';
        s.would_not_say.forEach(p => {
          html += `
            <div class="belief-card">
              <div class="belief-title">${esc(p.title)}</div>
              <div class="belief-desc">${esc(p.desc)}</div>
            </div>
          `;
        });
      }

      // Biography
      if (s.biography && s.biography.length > 0) {
        sections.push({ id: 'sec-biography', label: 'Biography' });
        html += '<div class="section-title" id="sec-biography">Biographical Pattern</div>';
        html += '<div class="timeline">';
        s.biography.forEach(entry => {
          html += `
            <div class="timeline-entry">
              <div class="timeline-date">${esc(entry.date)}</div>
              <div class="timeline-role">${esc(entry.role)}</div>
              <div class="timeline-lesson">${esc(entry.lesson)}</div>
            </div>
          `;
        });
        html += '</div>';
      }

      container.innerHTML = html;

      // Build section nav after we know the sections
      buildSectionNav();
      setupScrollSpy();
    }

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== LOAD DATA =====
    async function loadData() {
      let raw;
      try {
        const response = await fetch('brain-atoms.json');
        raw = await response.json();
      } catch (err) {
        console.log('Fetch failed, trying XHR...');
        raw = await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', 'brain-atoms.json', true);
          xhr.onload = () => resolve(JSON.parse(xhr.responseText));
          xhr.onerror = reject;
          xhr.send();
        });
      }
      brainMeta = raw.brain || {};
      synthesisMeta = raw.synthesis || {};
      atomsData = raw.atoms || [];
      connectionsData = raw.connections || [];
      atomsData.forEach(a => { atomMap[a.id] = a; });

      // Set brain name in sidebar
      document.getElementById('brainName').textContent = brainMeta.name || 'Brain';

      // Update synthesis tab label
      const synthesisTab = document.querySelector('.tab[data-tab="synthesis"]');
      if (synthesisTab && brainMeta.name) {
        const lastName = brainMeta.name.split(' ').pop();
        synthesisTab.textContent = 'How ' + lastName + ' Thinks';
      }

      renderSynthesis();
      initializeAtoms();
      renderSkills();
    }

    // ===== ATOMS =====
    function initializeAtoms() {
      const clusterCounts = {};
      atomsData.forEach(atom => {
        if (atom.cluster) {
          clusters.add(atom.cluster);
          clusterCounts[atom.cluster] = (clusterCounts[atom.cluster] || 0) + 1;
        }
      });

      const sortedClusters = Array.from(clusters).sort((a, b) => (clusterCounts[b] || 0) - (clusterCounts[a] || 0));

      const clustersDiv = document.getElementById('clusters');
      const allBtn = document.createElement('button');
      allBtn.className = 'cluster-item active';
      allBtn.innerHTML = `<span>All Clusters</span><span class="cluster-count">${atomsData.length}</span>`;
      allBtn.addEventListener('click', () => {
        currentCluster = null;
        document.querySelectorAll('.cluster-item').forEach(b => b.classList.remove('active'));
        allBtn.classList.add('active');
        applyFilters();
      });
      clustersDiv.appendChild(allBtn);

      sortedClusters.forEach(cluster => {
        const btn = document.createElement('button');
        btn.className = 'cluster-item';
        btn.innerHTML = `<span>${cluster}</span><span class="cluster-count">${clusterCounts[cluster]}</span>`;
        btn.addEventListener('click', () => filterByCluster(cluster, btn));
        clustersDiv.appendChild(btn);
      });

      renderAtoms(atomsData);

      const statsDiv = document.getElementById('stats');
      statsDiv.innerHTML = `
        <div><strong>${atomsData.length}</strong> atoms</div>
        <div><strong>${connectionsData.length}</strong> connections</div>
        <div><strong>${clusters.size}</strong> clusters</div>
      `;
    }

    function filterByCluster(cluster, btn) {
      if (currentCluster === cluster) {
        currentCluster = null;
        document.querySelectorAll('.cluster-item').forEach(b => b.classList.remove('active'));
        document.querySelector('.cluster-item').classList.add('active');
      } else {
        document.querySelectorAll('.cluster-item').forEach(b => b.classList.remove('active'));
        currentCluster = cluster;
        btn.classList.add('active');
      }
      applyFilters();
    }

    function applyFilters() {
      filteredAtoms = atomsData.filter(atom => {
        const matchesCluster = !currentCluster || atom.cluster === currentCluster;
        const matchesSearch = !currentSearch ||
          atom.content.toLowerCase().includes(currentSearch.toLowerCase()) ||
          (atom.original_quote && atom.original_quote.toLowerCase().includes(currentSearch.toLowerCase())) ||
          (atom.implication && atom.implication.toLowerCase().includes(currentSearch.toLowerCase())) ||
          (atom.topics && atom.topics.some(t => t.toLowerCase().includes(currentSearch.toLowerCase())));
        return matchesCluster && matchesSearch;
      });
      renderAtoms(filteredAtoms);
    }

    function getAtomConnections(atom) {
      const conns = [];
      if (atom.connections && atom.connections.length > 0) {
        atom.connections.forEach(c => {
          const targetAtom = atomMap[c.target_id];
          if (targetAtom) {
            conns.push({ type: c.relationship || c.type, atom: targetAtom });
          }
        });
      }
      connectionsData.forEach(c => {
        const fromId = c.from || c.atom_id_1;
        const toId = c.to || c.atom_id_2;
        if (fromId === atom.id) {
          const targetAtom = atomMap[toId];
          if (targetAtom && !conns.find(x => x.atom.id === targetAtom.id)) {
            conns.push({ type: c.relationship, atom: targetAtom });
          }
        }
        if (toId === atom.id) {
          const sourceAtom = atomMap[fromId];
          if (sourceAtom && !conns.find(x => x.atom.id === sourceAtom.id)) {
            conns.push({ type: c.relationship, atom: sourceAtom });
          }
        }
      });
      return conns;
    }

    function renderConnections(atom) {
      const conns = getAtomConnections(atom);
      if (conns.length === 0) {
        return '<div class="no-connections">No connections mapped for this atom.</div>';
      }

      let html = '';
      const grouped = {};
      conns.forEach(c => {
        const t = c.type || 'related';
        if (!grouped[t]) grouped[t] = [];
        grouped[t].push(c);
      });

      const typeOrder = ['supports', 'extends', 'contradicts', 'related', 'inspired_by'];
      typeOrder.forEach(type => {
        if (!grouped[type]) return;
        grouped[type].forEach(c => {
          const preview = c.atom.content.length > 120 ? c.atom.content.slice(0, 120) + '...' : c.atom.content;
          html += `
            <div class="connection-item" onclick="navigateToAtom('${c.atom.id}')">
              <span class="conn-type ${type}">${type.replace('_', ' ')}</span>
              <span class="conn-text">${esc(preview)}</span>
            </div>
          `;
        });
      });

      return html;
    }

    function navigateToAtom(atomId) {
      const atom = atomMap[atomId];
      if (!atom) return;

      const atomsTab = document.querySelector('.tab[data-tab="atoms"]');
      if (!document.getElementById('atoms').classList.contains('active')) {
        atomsTab.click();
      }

      if (atom.cluster && atom.cluster !== currentCluster) {
        currentCluster = atom.cluster;
        document.querySelectorAll('.cluster-item').forEach(b => {
          b.classList.remove('active');
          if (b.querySelector('span') && b.querySelector('span').textContent === atom.cluster) {
            b.classList.add('active');
          }
        });
        applyFilters();
      }

      expandedAtomId = atomId;
      renderAtoms(filteredAtoms);

      setTimeout(() => {
        const card = document.getElementById('atom-' + atomId);
        if (card) {
          card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    }

    function toggleAtom(atomId) {
      expandedAtomId = expandedAtomId === atomId ? null : atomId;
      renderAtoms(filteredAtoms.length > 0 || currentCluster || currentSearch ? filteredAtoms : atomsData);
    }

    function renderAtoms(atoms) {
      const grid = document.getElementById('atomsGrid');
      const noResults = document.getElementById('noResults');

      grid.innerHTML = '';

      if (atoms.length === 0) {
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';

      atoms.forEach((atom) => {
        const card = document.createElement('div');
        const isExpanded = expandedAtomId === atom.id;
        card.className = 'atom-card' + (isExpanded ? ' expanded' : '');
        card.id = 'atom-' + atom.id;

        let html = `
          <div class="atom-header" onclick="toggleAtom('${atom.id}')">
            <div class="atom-cluster-tag">${atom.cluster || 'uncategorized'}</div>
          </div>
          <div class="atom-content" onclick="toggleAtom('${atom.id}')">${esc(atom.content)}</div>
        `;

        if (atom.original_quote) {
          html += `<div class="atom-quote">"${esc(atom.original_quote)}"</div>`;
        }

        if (atom.implication) {
          html += `
            <div class="atom-implication">
              <div class="atom-implication-label">Implication:</div>
              <div class="atom-implication-text">${esc(atom.implication)}</div>
            </div>
          `;
        }

        html += '<div class="atom-footer">';

        if (atom.confidence_tier) {
          const tier = (atom.confidence_tier || 'medium').toUpperCase();
          const tierClass = 'confidence-' + atom.confidence_tier.toLowerCase();
          html += `<div class="confidence-badge ${tierClass}">${tier}</div>`;
        }

        if (atom.topics && atom.topics.length > 0) {
          html += '<div class="topic-chips">';
          atom.topics.forEach(topic => {
            html += `<button class="topic-chip" onclick="event.stopPropagation(); searchTopic('${topic.replace(/'/g, "\\'")}')">${esc(topic)}</button>`;
          });
          html += '</div>';
        }

        html += '</div>';

        // Expand/collapse hint with connection count
        const connCount = getAtomConnections(atom).length;
        const chevron = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
        if (connCount > 0 || atom.source_ref || atom.source_date) {
          html += `
            <div class="atom-expand-hint" onclick="toggleAtom('${atom.id}')">
              ${chevron}
              <span>${isExpanded ? 'Collapse' : connCount > 0 ? connCount + ' connection' + (connCount !== 1 ? 's' : '') + ' \u00b7 Click to expand' : 'Click to expand'}</span>
            </div>
          `;
        }

        if (isExpanded) {
          // Date and source metadata
          let metaHtml = '';
          if (atom.source_date) {
            const d = new Date(atom.source_date);
            const dateStr = d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            metaHtml += `<div class="atom-meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ${dateStr}</div>`;
          }
          if (atom.source_ref) {
            const ref = atom.source_ref;
            let isUrl = false;
            let domain = '';
            try { domain = new URL(ref).hostname.replace('www.', ''); isUrl = true; } catch(e) {}
            const sourceIcon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`;
            if (isUrl) {
              metaHtml += `<div class="atom-meta-item">${sourceIcon} <a href="${esc(ref)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(domain)}</a></div>`;
            } else {
              metaHtml += `<div class="atom-meta-item">${sourceIcon} ${esc(ref)}</div>`;
            }
          }
          if (metaHtml) {
            html += `<div class="connections-panel"><div class="atom-meta">${metaHtml}</div>`;
          } else {
            html += `<div class="connections-panel">`;
          }

          if (connCount > 0) {
            html += `
              <div class="connections-label">Connections (${connCount})</div>
              ${renderConnections(atom)}
            `;
          }
          html += '</div>';
        }

        card.innerHTML = html;
        grid.appendChild(card);
      });
    }

    function searchTopic(topic) {
      document.getElementById('searchInput').value = topic;
      currentSearch = topic;
      currentCluster = null;
      document.querySelectorAll('.cluster-item').forEach(b => b.classList.remove('active'));
      document.querySelector('.cluster-item').classList.add('active');
      applyFilters();
    }

    // ===== SEARCH INPUT =====
    document.getElementById('searchInput').addEventListener('keyup', (e) => {
      currentSearch = e.target.value;
      applyFilters();
    });

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.getElementById('atoms').classList.contains('active')) {
        e.preventDefault();
        document.getElementById('searchInput').focus();
      }
      if (e.key === 'Escape') {
        document.getElementById('searchInput').value = '';
        currentSearch = '';
        expandedAtomId = null;
        applyFilters();
      }
    });

    // ===== SKILLS (data-driven from brain-atoms.json) =====
    function renderSkills() {
      const grid = document.getElementById('skillsGrid');
      const skillsList = synthesisMeta.skills || [];

      if (skillsList.length === 0) {
        // Fallback: default 8 skills
        return;
      }

      skillsList.forEach(skill => {
        const card = document.createElement('div');
        card.className = 'skill-card';
        card.innerHTML = `
          <div class="skill-name">/${esc(skill.name)}</div>
          <div class="skill-title">${esc(skill.title)}</div>
          <div class="skill-desc">${esc(skill.desc)}</div>
          <div class="skill-example">${esc(skill.example)}</div>
        `;
        grid.appendChild(card);
      });
    }

    // ===== FORCE-DIRECTED GRAPH =====
    const CLUSTER_COLORS = {
      'startups_founding': '#6366f1',
      'ideas_creativity': '#ec4899',
      'ambition_greatwork': '#d97706',
      'wealth_economics': '#059669',
      'programming_hackers': '#0ea5e9',
      'design_taste': '#8b5cf6',
      'philosophy_life': '#f87171',
      'writing_thinking': '#60a5fa',
      'growth_scale': '#34d399',
      'silicon_valley': '#fbbf24',
      'education_learning': '#a78bfa',
      'fundraising_investors': '#fb923c',
      // Belsky clusters
      'ai_agents': '#0ea5e9',
      'product_design': '#6366f1',
      'leadership_org': '#d97706',
      'creativity_taste': '#ec4899',
      'business_models': '#059669',
      'culture_teams': '#8b5cf6'
    };

    const EDGE_COLORS = {
      'supports': '#6366f1',
      'extends': '#60a5fa',
      'related': '#a855f7',
      'contradicts': '#f87171',
      'inspired_by': '#fbbf24'
    };

    let graphNodes = [];
    let graphEdges = [];
    let graphFilter = null;
    let graphCanvas, graphCtx;
    let graphWidth, graphHeight;
    let hoveredNode = null;
    let selectedNode = null;
    let graphAnimFrame = null;
    let graphInited = false;
    let graphDragNode = null;
    let graphMouseX = 0, graphMouseY = 0;

    function initGraph() {
      if (graphInited) return;
      graphInited = true;

      graphCanvas = document.getElementById('graph-canvas');
      graphCtx = graphCanvas.getContext('2d');

      function resize() {
        const rect = graphCanvas.parentElement.getBoundingClientRect();
        graphWidth = rect.width;
        graphHeight = rect.height;
        graphCanvas.width = graphWidth * devicePixelRatio;
        graphCanvas.height = graphHeight * devicePixelRatio;
        graphCanvas.style.width = graphWidth + 'px';
        graphCanvas.style.height = graphHeight + 'px';
        graphCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      }
      resize();
      window.addEventListener('resize', resize);

      // Build nodes from atoms
      const cx = graphWidth / 2;
      const cy = graphHeight / 2;

      // Count atoms per cluster to position them near their cluster center
      const clusterAtomIndex = {};
      atomsData.forEach(a => { clusterAtomIndex[a.cluster] = (clusterAtomIndex[a.cluster] || 0) + 1; });
      const clusterAtomSeen = {};

      graphNodes = atomsData.map((atom, i) => {
        // Position near the pre-computed fixed cluster center with jitter
        const clusters = [...new Set(atomsData.map(a => a.cluster))];
        const clusterIdx = clusters.indexOf(atom.cluster);
        const clusterAngle = (clusterIdx / clusters.length) * Math.PI * 2 - Math.PI / 2;
        const clusterR = Math.min(graphWidth, graphHeight) * 0.28;
        const clusterCx = cx + Math.cos(clusterAngle) * clusterR;
        const clusterCy = cy + Math.sin(clusterAngle) * clusterR;
        const jitter = 60 + Math.random() * 80;
        const jAngle = Math.random() * Math.PI * 2;
        return {
          id: atom.id,
          x: clusterCx + Math.cos(jAngle) * jitter,
          y: clusterCy + Math.sin(jAngle) * jitter,
          vx: 0,
          vy: 0,
          cluster: atom.cluster,
          content: atom.content,
          original_quote: atom.original_quote,
          confidence: atom.confidence || 0.5,
          radius: 4 + (atom.confidence || 0.5) * 6,
          atom: atom
        };
      });

      // Build edges from connections
      const nodeMap = {};
      graphNodes.forEach(n => { nodeMap[n.id] = n; });

      connectionsData.forEach(c => {
        const fromId = c.from || c.atom_id_1;
        const toId = c.to || c.atom_id_2;
        const source = nodeMap[fromId];
        const target = nodeMap[toId];
        if (source && target) {
          graphEdges.push({
            source,
            target,
            type: c.relationship || 'related',
            confidence: c.confidence || 0.5
          });
        }
      });

      // Mouse interaction
      graphCanvas.addEventListener('mousemove', (e) => {
        const rect = graphCanvas.getBoundingClientRect();
        graphMouseX = e.clientX - rect.left;
        graphMouseY = e.clientY - rect.top;

        if (graphDragNode) {
          graphDragNode.x = graphMouseX;
          graphDragNode.y = graphMouseY;
          graphDragNode.vx = 0;
          graphDragNode.vy = 0;
          return;
        }

        // Hit test
        hoveredNode = null;
        for (const node of graphNodes) {
          const dx = graphMouseX - node.x;
          const dy = graphMouseY - node.y;
          if (dx * dx + dy * dy < (node.radius + 4) * (node.radius + 4)) {
            hoveredNode = node;
            break;
          }
        }

        graphCanvas.style.cursor = hoveredNode ? 'pointer' : 'default';

        // Tooltip
        const tt = document.getElementById('graphTooltip');
        if (hoveredNode) {
          const preview = hoveredNode.content.length > 200 ? hoveredNode.content.slice(0, 200) + '...' : hoveredNode.content;
          let html = `<div class="tt-cluster">${hoveredNode.cluster}</div>`;
          html += `<div class="tt-content">${esc(preview)}</div>`;
          if (hoveredNode.original_quote) {
            const q = hoveredNode.original_quote.length > 150 ? hoveredNode.original_quote.slice(0, 150) + '...' : hoveredNode.original_quote;
            html += `<div class="tt-quote">"${esc(q)}"</div>`;
          }
          tt.innerHTML = html;
          tt.style.display = 'block';
          const tx = Math.min(graphMouseX + 16, graphWidth - 360);
          const ty = Math.min(graphMouseY + 16, graphHeight - 200);
          tt.style.left = tx + 'px';
          tt.style.top = ty + 'px';
        } else {
          tt.style.display = 'none';
        }
      });

      graphCanvas.addEventListener('mousedown', (e) => {
        if (hoveredNode) {
          graphDragNode = hoveredNode;
          selectedNode = hoveredNode;
        } else {
          selectedNode = null;
        }
      });

      graphCanvas.addEventListener('mouseup', () => {
        graphDragNode = null;
      });

      graphCanvas.addEventListener('mouseleave', () => {
        graphDragNode = null;
        hoveredNode = null;
        document.getElementById('graphTooltip').style.display = 'none';
      });

      graphCanvas.addEventListener('dblclick', () => {
        if (hoveredNode) {
          navigateToAtom(hoveredNode.id);
        }
      });

      runGraphSimulation();
    }

    function runGraphSimulation() {
      // Pre-compute FIXED cluster anchor positions in a circle
      const clusters = [...new Set(graphNodes.map(n => n.cluster))];
      const cx = graphWidth / 2;
      const cy = graphHeight / 2;
      const clusterRadius = Math.min(graphWidth, graphHeight) * 0.3;
      const clusterAnchors = {};
      clusters.forEach((c, i) => {
        const angle = (i / clusters.length) * Math.PI * 2 - Math.PI / 2;
        clusterAnchors[c] = {
          x: cx + Math.cos(angle) * clusterRadius,
          y: cy + Math.sin(angle) * clusterRadius
        };
      });

      // Phase 1: layout (forces active). Phase 2: settled (only drag reacts).
      let settled = false;
      let frame = 0;
      const settleAt = 400;

      function tick() {
        frame++;

        if (!settled) {
          // Alpha decays but has a floor — repulsion NEVER goes to zero
          const alpha = Math.max(0.05, 1 - (frame / settleAt));

          // Cluster anchoring — pull toward fixed positions (strong early, fades)
          const clusterPull = 0.003 * alpha;
          graphNodes.forEach(n => {
            const anchor = clusterAnchors[n.cluster];
            if (anchor) {
              n.vx += (anchor.x - n.x) * clusterPull;
              n.vy += (anchor.y - n.y) * clusterPull;
            }
          });

          // Very gentle center gravity — just keeps things from drifting off-screen
          graphNodes.forEach(n => {
            n.vx += (cx - n.x) * 0.00003;
            n.vy += (cy - n.y) * 0.00003;
          });

          // Repulsion — constant strength, never decays
          const repStr = 300;
          for (let i = 0; i < graphNodes.length; i++) {
            for (let j = i + 1; j < graphNodes.length; j++) {
              const a = graphNodes[i];
              const b = graphNodes[j];
              let dx = b.x - a.x;
              let dy = b.y - a.y;
              let dist = Math.sqrt(dx * dx + dy * dy) || 1;
              if (dist < 20) dist = 20;
              const force = -repStr / (dist * dist);
              const fx = (dx / dist) * force;
              const fy = (dy / dist) * force;
              a.vx -= fx; a.vy -= fy;
              b.vx += fx; b.vy += fy;
            }
          }

          // Spring forces — pull connected nodes together
          const springStr = 0.005 * Math.max(alpha, 0.15);
          graphEdges.forEach(e => {
            if (graphFilter && e.type !== graphFilter) return;
            const dx = e.target.x - e.source.x;
            const dy = e.target.y - e.source.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const target = e.type === 'extends' ? 40 : 80;
            const force = (dist - target) * springStr;
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            e.source.vx += fx; e.source.vy += fy;
            e.target.vx -= fx; e.target.vy -= fy;
          });

          // Apply velocities with damping
          const damping = 0.75 + 0.1 * (frame / settleAt);
          graphNodes.forEach(n => {
            if (n === graphDragNode) return;
            n.vx *= Math.min(damping, 0.88);
            n.vy *= Math.min(damping, 0.88);
            n.x += n.vx;
            n.y += n.vy;
            const pad = 20;
            n.x = Math.max(n.radius + pad, Math.min(graphWidth - n.radius - pad, n.x));
            n.y = Math.max(n.radius + pad, Math.min(graphHeight - n.radius - pad, n.y));
          });

          if (frame >= settleAt) settled = true;
        } else if (graphDragNode) {
          // When dragging in settled state, nudge neighbors slightly for organic feel
          graphEdges.forEach(e => {
            if (e.source === graphDragNode || e.target === graphDragNode) {
              const other = e.source === graphDragNode ? e.target : e.source;
              const dx = graphDragNode.x - other.x;
              const dy = graphDragNode.y - other.y;
              const dist = Math.sqrt(dx * dx + dy * dy) || 1;
              other.vx += (dx / dist) * 0.3;
              other.vy += (dy / dist) * 0.3;
              other.x += other.vx;
              other.y += other.vy;
              other.vx *= 0.8;
              other.vy *= 0.8;
            }
          });
        }

        drawGraph();
        graphAnimFrame = requestAnimationFrame(tick);
      }

      tick();
    }

    function drawGraph() {
      graphCtx.clearRect(0, 0, graphWidth, graphHeight);

      // Determine highlighted connections
      const highlightedNodes = new Set();
      if (selectedNode || hoveredNode) {
        const focusNode = selectedNode || hoveredNode;
        highlightedNodes.add(focusNode.id);
        graphEdges.forEach(e => {
          if (graphFilter && e.type !== graphFilter) return;
          if (e.source.id === focusNode.id) highlightedNodes.add(e.target.id);
          if (e.target.id === focusNode.id) highlightedNodes.add(e.source.id);
        });
      }

      const hasHighlight = highlightedNodes.size > 0;

      // Draw edges
      graphEdges.forEach(e => {
        if (graphFilter && e.type !== graphFilter) return;
        const isHighlighted = hasHighlight && (highlightedNodes.has(e.source.id) && highlightedNodes.has(e.target.id));
        const alpha = hasHighlight ? (isHighlighted ? 0.8 : 0.04) : 0.25;
        const color = EDGE_COLORS[e.type] || '#6366f1';

        graphCtx.beginPath();
        graphCtx.moveTo(e.source.x, e.source.y);
        graphCtx.lineTo(e.target.x, e.target.y);
        graphCtx.strokeStyle = color;
        graphCtx.globalAlpha = alpha;
        graphCtx.lineWidth = isHighlighted ? 2 : 1;
        graphCtx.stroke();
      });

      graphCtx.globalAlpha = 1;

      // Draw nodes
      graphNodes.forEach(n => {
        const color = CLUSTER_COLORS[n.cluster] || '#6366f1';
        const isHighlighted = !hasHighlight || highlightedNodes.has(n.id);
        const isFocus = (selectedNode && n.id === selectedNode.id) || (hoveredNode && n.id === hoveredNode.id);

        graphCtx.beginPath();
        graphCtx.arc(n.x, n.y, n.radius + (isFocus ? 3 : 0), 0, Math.PI * 2);
        graphCtx.fillStyle = color;
        graphCtx.globalAlpha = isHighlighted ? 1 : 0.12;
        graphCtx.fill();

        if (isFocus) {
          graphCtx.globalAlpha = 0.5;
          graphCtx.beginPath();
          graphCtx.arc(n.x, n.y, n.radius + 8, 0, Math.PI * 2);
          graphCtx.strokeStyle = color;
          graphCtx.lineWidth = 2;
          graphCtx.stroke();
        }
      });

      graphCtx.globalAlpha = 1;
    }

    function setGraphFilter(filter, btn) {
      graphFilter = filter;
      document.querySelectorAll('.graph-controls .graph-btn').forEach(b => {
        // Don't remove active from Surprise button
        if (b.textContent.includes('Surprise')) return;
        b.classList.remove('active');
      });
      if (btn) btn.classList.add('active');
    }

    function surpriseGraph() {
      // Zoom to a random high-confidence atom on the graph
      const highConf = graphNodes.filter(n => n.confidence >= 0.7);
      const pool = highConf.length > 0 ? highConf : graphNodes;
      const node = pool[Math.floor(Math.random() * pool.length)];

      // Select the node to highlight its connections
      selectedNode = node;

      // Smoothly animate to center on this node
      const targetX = graphWidth / 2 - node.x;
      const targetY = graphHeight / 2 - node.y;
      const steps = 30;
      let step = 0;

      function animateToNode() {
        step++;
        const t = step / steps;
        const ease = t * (2 - t); // ease-out
        graphNodes.forEach(n => {
          n.x += (targetX / steps) * ease * 0.5;
          n.y += (targetY / steps) * ease * 0.5;
        });
        drawGraph();
        if (step < steps) requestAnimationFrame(animateToNode);
      }
      animateToNode();

      // Show tooltip for the surprised atom
      const tt = document.getElementById('graphTooltip');
      const preview = node.content.length > 200 ? node.content.slice(0, 200) + '...' : node.content;
      let html = `<div class="tt-cluster">${esc(node.cluster)}</div>`;
      html += `<div class="tt-content">${esc(preview)}</div>`;
      if (node.original_quote) {
        const q = node.original_quote.length > 150 ? node.original_quote.slice(0, 150) + '...' : node.original_quote;
        html += `<div class="tt-quote">"${esc(q)}"</div>`;
      }
      // Show connection count
      const connCount = graphEdges.filter(e => e.source.id === node.id || e.target.id === node.id).length;
      html += `<div style="margin-top:8px;font-size:11px;color:var(--text-dim);">${connCount} connections · double-click to explore</div>`;
      tt.innerHTML = html;
      tt.style.display = 'block';
      tt.style.left = (graphWidth / 2 + 20) + 'px';
      tt.style.top = (graphHeight / 2 - 40) + 'px';
    }

    // ===== SURPRISE ME =====
    let seenSurpriseIds = new Set();

    function showSurprise() {
      // Pick a random high-confidence atom we haven't shown yet
      const highConf = atomsData.filter(a =>
        (a.confidence || 0) >= 0.7 && !seenSurpriseIds.has(a.id)
      );
      // If we've seen them all, reset
      const pool = highConf.length > 0 ? highConf : atomsData;
      if (highConf.length === 0) seenSurpriseIds.clear();

      const atom = pool[Math.floor(Math.random() * pool.length)];
      seenSurpriseIds.add(atom.id);

      const conns = getAtomConnections(atom).slice(0, 3);
      const card = document.getElementById('surpriseCard');

      let html = `<div class="sc-cluster">${esc(atom.cluster)}</div>`;
      html += `<div class="sc-content">${esc(atom.content)}</div>`;

      if (atom.original_quote) {
        html += `<div class="sc-quote">"${esc(atom.original_quote)}"</div>`;
      }

      if (conns.length > 0) {
        html += '<div class="sc-connections">';
        html += `<div style="font-weight: 600; margin-bottom: 8px; color: var(--text);">Connected to:</div>`;
        conns.forEach(c => {
          const preview = c.atom.content.length > 100 ? c.atom.content.slice(0, 100) + '...' : c.atom.content;
          html += `
            <div class="sc-conn-item" onclick="closeSurprise(); navigateToAtom('${c.atom.id}')">
              <span class="conn-type ${c.type}">${c.type.replace('_', ' ')}</span>
              <span class="conn-text">${esc(preview)}</span>
            </div>
          `;
        });
        html += '</div>';
      }

      html += `
        <div class="surprise-actions">
          <button class="btn-another" onclick="showSurprise()">✨ Another</button>
          <button class="btn-explore" onclick="closeSurprise(); navigateToAtom('${atom.id}')">Explore</button>
          <button class="btn-close" onclick="closeSurprise()">Close</button>
        </div>
      `;

      card.innerHTML = html;
      document.getElementById('surpriseOverlay').classList.add('visible');
    }

    function closeSurprise() {
      document.getElementById('surpriseOverlay').classList.remove('visible');
    }

    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSurprise();
    });

    // ===== INIT =====
    setSidebarMode('synthesis');
    loadData();
  </script>
